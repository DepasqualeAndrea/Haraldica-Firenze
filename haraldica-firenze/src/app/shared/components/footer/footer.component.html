<footer class="footer">
  <div class="footer__inner container">

    <!-- Col 1: Logo + Description -->
    <div class="footer__col footer__col--brand">
      <a routerLink="/" class="footer__logo" aria-label="Haraldica Firenze">
        <svg class="footer__crest" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20 2L4 10V26C4 36 20 46 20 46C20 46 36 36 36 26V10L20 2Z" stroke="#C8B084" stroke-width="1.5"/>
          <path d="M20 10L12 14V24C12 30 20 36 20 36C20 36 28 30 28 24V14L20 10Z" fill="rgba(200,176,132,0.15)" stroke="#C8B084" stroke-width="1"/>
          <path d="M16 20L19 23L24 17" stroke="#C8B084" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="footer__logo-text">HARADICA FIRENZE</span>
      </a>
      <p class="footer__description">
        Embodying the essence of Italian luxury and innovation. Crafted in Florence since 1878.
      </p>
    </div>

    <!-- Col 2: Newsletter -->
    <div class="footer__col footer__col--newsletter">
      <p class="footer__newsletter-label">Newsletter</p>
      <div class="footer__newsletter-form">
        <label for="newsletter-email" class="visually-hidden">Enter your email</label>
        <input
          id="newsletter-email"
          type="email"
          class="footer__newsletter-input"
          placeholder="Enter your email"
          #emailInput
        >
        <button
          class="btn-icon"
          type="button"
          (click)="onNewsletterSubmit(emailInput.value)"
          aria-label="Subscribe to newsletter"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Col 3: Links & Copyright -->
    <div class="footer__col footer__col--links">
      <nav aria-label="Footer navigation">
        <ul class="footer__links">
          @for (link of footerLinks; track link.label) {
            <li>
              <a [routerLink]="link.path" class="footer__link">{{ link.label }}</a>
            </li>
          }
        </ul>
      </nav>
      <p class="footer__copyright">© {{ currentYear }} Haraldica Firenze. All rights reserved.</p>
    </div>

  </div>
</footer>
