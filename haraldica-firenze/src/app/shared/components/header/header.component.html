<header class="header">
  <div class="header__top">
    <!-- Logo -->
    <a routerLink="/" class="header__logo" aria-label="Haraldica Firenze Homepage">
      <!-- Heraldic Crest SVG -->
      <svg class="header__crest" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 2L4 10V26C4 36 20 46 20 46C20 46 36 36 36 26V10L20 2Z" stroke="#C8B084" stroke-width="1.5"/>
        <path d="M20 10L12 14V24C12 30 20 36 20 36C20 36 28 30 28 24V14L20 10Z" fill="rgba(200,176,132,0.15)" stroke="#C8B084" stroke-width="1"/>
        <path d="M16 20L19 23L24 17" stroke="#C8B084" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="header__logo-text">HARALDICA FIRENZE</span>
    </a>

    <!-- Right Icons -->
    <div class="header__icons">
      <button class="header__icon-btn" aria-label="Search">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="header__icon-btn header__cart-btn" (click)="openCart()" aria-label="Shopping cart">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        @if (cartCount() > 0) {
          <span class="header__cart-badge">{{ cartCount() }}</span>
        }
      </button>
    </div>
  </div>

  <!-- Gold Divider -->
  <div class="gold-divider"></div>

  <!-- Navigation -->
  <nav class="header__nav" aria-label="Main navigation">
    <ul class="header__nav-list">
      @for (link of navLinks; track link.label) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="active"
            class="header__nav-link"
          >{{ link.label }}</a>
        </li>
      }
    </ul>
  </nav>

  <!-- Bottom Gold Divider -->
  <div class="gold-divider"></div>
</header>
